<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Viewer</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #f5f5f5;
      }

      h1 {
        color: #333;
      }

      .button-container {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        margin-bottom: 20px;
        justify-content: center;
      }

      button {
        padding: 12px 25px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: background-color 0.3s ease;
      }

      button:hover {
        background-color: #0056b3;
      }

      .error-message {
        color: red;
        font-weight: bold;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <h1>PDF Viewer</h1>
    <div class="button-container" id="button-container"></div>
    <div id="error-message" class="error-message"></div>

    <script>
      const pdfData = [
        { name: "Program 1", url: "/1.pdf" },
        { name: "Program 2", url: "/2.pdf" },
        { name: "Program 3", url: "/3.pdf" },
        { name: "Program 4", url: "/4.pdf" },
        { name: "Program 5", url: "/5.pdf" },
        { name: "Program 6", url: "/6.pdf" },
        { name: "Program 7", url: "/7.pdf" },
        { name: "Program 8", url: "/8.pdf" },
        { name: "Program 10", url: "/10.pdf" },
        // Add more PDFs here
      ];

      const buttonContainer = document.getElementById("button-container");

      // Function to open the PDF in a new tab (directly from the click event)
      function openPDFInNewTab(url) {
        window.open(url, "_blank");
      }

      // Create buttons for each PDF file
      pdfData.forEach((pdf) => {
        const button = document.createElement("button");
        button.textContent = pdf.name;
        button.onclick = () => openPDFInNewTab(pdf.url);
        buttonContainer.appendChild(button);
      });
    </script>
  </body>
</html>
